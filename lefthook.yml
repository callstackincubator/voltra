pre-commit:
  jobs:
    - name: format-js
      glob:
        - '*.{js,jsx,ts,tsx,json,md,mdx,yml,yaml}'
      run: npm run format:js:fix:staged -- {staged_files}
      stage_fixed: true

    - name: format-kotlin
      glob:
        - 'packages/android-client/android/**/*.kt'
      run: npm run format:kotlin:fix:staged -- {staged_files}
      stage_fixed: true

    - name: format-swift
      glob:
        - 'packages/ios-client/ios/**/*.swift'
      run: npm run format:swift:fix:staged -- {staged_files}
      stage_fixed: true
