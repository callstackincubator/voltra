pre-commit:
  jobs:
    - name: format-js
      glob:
        - '*.{js,jsx,ts,tsx,json,md,mdx,yml,yaml}'
      run: npm run format:js:fix:staged -- {staged_files}
      stage_fixed: true

    - name: format-kotlin
      glob:
        - 'packages/android-client/android/**/*.kt'
      run: npm run format:kotlin:fix:staged -- {staged_files}
      stage_fixed: true

    - name: format-swift
      glob:
        - 'packages/ios-client/ios/**/*.swift'
      run: npm run format:swift:fix:staged -- {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: test-js
      run: npm run test:js:pre-push

    - name: test-kotlin
      run: npm run test:kotlin:pre-push

    - name: test-swift
      run: npm run test:swift:pre-push
